<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
<div class="logo">SmartCart</div>
</nav>

<div class="container">

<h2>Checkout</h2>

<form id="checkoutForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<br><br>

<input
type="text"
id="phone"
placeholder="Phone Number"
required>

<br><br>

<textarea
id="address"
placeholder="Address"
required>
</textarea>

<br><br>

<button
type="submit"
class="btn btn-success">
Place Order
</button>

</form>

</div>

<script src="js/checkout.js"></script>

</body>
</html>
